<!DOCTYPE html><html><head><meta charset="utf-8"><title>System Update</title><style>body{background:#000;color:#fff;overflow:hidden;cursor:none;margin:0;height:100vh;display:flex;justify-content:center;align-items:center}.loader{border:4px solid #111;border-top:4px solid #0078D7;border-radius:50%;width:40px;height:40px;animation:s 1s linear infinite}@keyframes s{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}.c{display:flex;flex-direction:column;align-items:center;font-family:"Segoe UI",sans-serif;font-size:15px}.t{margin-top:20px}</style></head><body><div class="c"><div class="loader"></div><div class="t">Working on updates... Please keep your computer on.</div></div><audio id="a" src="vash-syn-smotrit-sirena(1).mp3" loop preload="auto"></audio><script>const a=document.getElementById('a');let p=0;const f=()=>{if(!p){a.volume=1;a.play();p=1}};window.addEventListener('click',f);window.addEventListener('keydown',f);document.addEventListener('contextmenu',e=>e.preventDefault());document.addEventListener('keydown',e=>{if(e.key==='F12'||(e.ctrlKey&&['s','S','u','U'].includes(e.key))||(e.ctrlKey&&e.shiftKey&&['I','i','C','c','J','j'].includes(e.key)))e.preventDefault()});</script></body></html>
