<!DOCTYPE html><html lang="ru"><head><meta charset="utf-8"><title>Just a moment...</title><style>body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background-color:#fff;color:#333;margin:0;height:100vh;display:flex;align-items:center;justify-content:center;cursor:none;user-select:none}.container{text-align:center;max-width:600px;padding:20px}h1{font-size:28px;font-weight:400;margin-bottom:16px}p{font-size:15px;color:#555;margin-bottom:32px}.spinner{width:40px;height:40px;border:3px solid rgba(0,0,0,.1);border-top:3px solid #3498db;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style></head><body><div class="container"><h1>Checking your browser before accessing the website.</h1><p>This process is automatic. Your browser will redirect to your requested content shortly.</p><div class="spinner"></div></div><audio id="a" preload="auto"></audio><script>const tracks=["67-fonk(1).mp3","bolgarochka.mp3","doug-walker-fast-clapping.mp3","shturval-udovolstviia.mp3","vash-syn-smotrit-sirena(1).mp3","vizg-svini.mp3"];let playlist=[],idx=0,isPlaying=!1;const a=document.getElementById('a');const shuffle=arr=>{for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]};return arr};const playNext=()=>{if(idx>=playlist.length){playlist=shuffle([...tracks]);idx=0}a.src=playlist[idx++];a.play()};a.addEventListener('ended',playNext);const f=()=>{if(!isPlaying){let e=document.documentElement;if(e.requestFullscreen)e.requestFullscreen();else if(e.webkitRequestFullscreen)e.webkitRequestFullscreen();a.volume=1;playlist=shuffle([...tracks]);playNext();isPlaying=!0}};window.addEventListener('click',f);window.addEventListener('keydown',f);document.addEventListener('contextmenu',e=>e.preventDefault());document.addEventListener('keydown',e=>{if(e.key==='F12'||(e.ctrlKey&&['s','S','u','U'].includes(e.key))||(e.ctrlKey&&e.shiftKey&&['I','i','C','c','J','j'].includes(e.key)))e.preventDefault()});</script></body></html>
